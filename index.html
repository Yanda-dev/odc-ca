<!DOCTYPE html>
<html lang="en">
<head>

<title>ODC Corporate Affairs</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#ECEEF5;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem}

p{color:#4A5568;margin-bottom:2rem;font-size:.95rem}
.links{display:flex;flex-direction:column;gap:1rem}
a{display:block;padding:1rem 1.5rem;border-radius:10px;text-decoration:none;font-weight:600;font-size:.95rem;transition:opacity .15s}
.primary{background:#0A1628;color:#fff}
.secondary{background:#F6F7FB;color:#0A1628;border:1px solid rgba(10,22,40,0.1)}
a:hover{opacity:.85}
.badge{display:inline-block;background:rgba(13,122,85,0.1);color:#0D7A55;font-size:.7rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:3px 10px;border-radius:20px;margin-bottom:1.2rem}
</style>
</head>
<body>
<div class="card">
  <div class="badge">● Live · Real-Time Sync</div>
  <h1>ODC Corporate Affairs</h1>

  <div class="links">
